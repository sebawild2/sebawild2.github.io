<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Strings to Structure — de Bruijn Graphs</title>
<style>
    :root {
        --bg:#f1e9d2; --panel:#f6efe0; --panel-2:#faf6eb; --controls:#e8ddbe;
        --line-soft:#e2d6b5; --line:#bcaf92; --line-2:#dcd0b0;
        --ink:#4a3f35; --ink-soft:#726253; --ink-faint:#8c7b70;
        --bar-lo:#e2b3a3; --bar-hi:#670c07; --red:#e60000; --red-br:#ff0000; --teal:#1f7a8c;
    }
    * { box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink-soft);
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        display:flex; flex-direction:column; align-items:center; min-height:100vh; margin:0; padding:28px 20px 48px; }
    h1 { font-size:1.6rem; font-weight:500; margin:0 0 4px; letter-spacing:.5px; color:var(--ink); text-align:center; }
    .subtitle { font-size:.92rem; color:var(--ink-faint); margin-bottom:22px; text-align:center; max-width:720px; }

    .stage-wrap { width:100%; max-width:1060px; background:var(--panel); border:1px solid var(--line-soft);
        border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.04); overflow:hidden; }
    .stage-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 20px;
        border-bottom:1px solid var(--line-soft); background:var(--panel-2); flex-wrap:wrap; }
    .step-eyebrow { font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:700; }
    .step-title { font-size:1.05rem; font-weight:600; color:var(--ink); margin-top:2px; }
    .badge { font-size:.78rem; font-weight:600; padding:6px 12px; border-radius:999px; background:var(--panel);
        border:1px solid var(--line-2); color:var(--ink-faint); white-space:nowrap; }
    .badge b { color:var(--bar-hi); }
    .badge .amb { color:#a85a07; } .badge .uniq { color:#4e7a4f; }
    svg.stage { display:block; width:100%; height:auto; background:var(--bg); }

    .stage-foot { padding:14px 20px 16px; border-top:1px solid var(--line-soft); background:var(--panel-2);
        display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap; }
    .caption { font-size:.92rem; line-height:1.5; color:var(--ink-soft); max-width:620px; }
    .caption b { color:var(--ink); font-weight:600; }
    .caption .err { color:#a32116; font-weight:600; }
    .readout { font-size:.72rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
    .swatch { width:9px; height:9px; border-radius:50%; display:inline-block; }
    .recon-row { margin-bottom:10px; }
    .seq-tiles { display:flex; gap:3px; flex-wrap:wrap; }
    .seq-tiles .tile { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:.9rem; font-weight:700; color:#fff;
        width:22px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:3px;
        background:var(--line); opacity:0; transition:opacity .2s; }
    .seq-tiles .tile.show { opacity:1; }
    .seq-tiles .tile.diff { outline:2px solid currentColor; outline-offset:1px; }

    .progress { display:flex; gap:7px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--line-2); border:1px solid var(--line);
        cursor:pointer; transition:background .2s,transform .2s; }
    .dot.active { background:var(--bar-hi); border-color:var(--bar-hi); transform:scale(1.15); }
    .dot.done { background:var(--line); }

    .controls { display:flex; gap:20px; margin-top:24px; align-items:center; justify-content:center;
        background:var(--controls); padding:12px 22px; border-radius:6px; border:1px solid var(--line-2); flex-wrap:wrap; }
    .btn-group { display:flex; gap:10px; }
    button { background:var(--panel-2); color:var(--ink); border:1px solid var(--line); padding:8px 16px;
        font-size:.9rem; border-radius:4px; cursor:pointer; transition:background .2s,border-color .2s; font-weight:500; }
    button:hover:not(:disabled) { background:#fff; border-color:#9a8c6f; }
    button:disabled { opacity:.4; cursor:not-allowed; }
    button.primary { background:var(--bar-hi); color:#f6efe0; border-color:var(--bar-hi); }
    button.primary:hover:not(:disabled) { background:#560a06; border-color:#560a06; }

    .seq-picker { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .seq-picker .lbl { font-size:.82rem; color:var(--ink-soft); }
    .chip { font-family:ui-monospace,Menlo,monospace; font-size:.8rem; padding:6px 11px; border-radius:4px;
        border:1px solid var(--line); background:var(--panel-2); cursor:pointer; color:var(--ink); }
    .chip.active { background:var(--bar-hi); color:#f6efe0; border-color:var(--bar-hi); }
    .chip:hover:not(.active) { background:#fff; }
    input[type="text"] { font-family:ui-monospace,Menlo,monospace; font-size:.8rem; padding:6px 9px; width:140px;
        border:1px solid var(--line); border-radius:4px; background:var(--panel-2); color:var(--ink); text-transform:uppercase; }
    input[type="text"]:focus { outline:2px solid var(--red); }
    .slider-group { display:flex; align-items:center; gap:8px; font-size:.85rem; color:#5c4f43; }
    .slider-group .val { font-variant-numeric:tabular-nums; min-width:14px; font-weight:600; color:var(--ink); }
    input[type="range"] { accent-color:var(--red); cursor:pointer; }

    .e-path { fill:none; stroke:var(--line); stroke-width:2.5; transition:stroke .2s,stroke-width .2s; }
    .e-label { font-family:ui-monospace,Menlo,monospace; font-size:12px; font-weight:700; fill:var(--ink-soft);
        text-anchor:middle; paint-order:stroke; stroke:var(--bg); stroke-width:4px; }
    .node-c { fill:var(--panel-2); stroke:var(--bar-hi); stroke-width:2.5; transition:stroke .25s,stroke-width .2s,fill .2s; }
    .node-c.live { stroke:var(--red-br); stroke-width:4; fill:#fff; }
    .node-c.dup { stroke:var(--line); }
    .node-t { font-family:ui-monospace,Menlo,monospace; font-weight:700; fill:var(--ink); text-anchor:middle; dominant-baseline:central; }
    .read-card text { font-family:ui-monospace,Menlo,monospace; font-weight:700; }
    .fade-in { animation:fadeIn .4s ease both; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .mono { font-family:ui-monospace,Menlo,monospace; }
    @media (prefers-reduced-motion:reduce){ * { animation:none!important; transition:none!important; } }
    @media (max-width:640px){ .stage-foot{flex-direction:column} h1{font-size:1.3rem} }
</style>
</head>
<body>

    <h1>From String Chaos to Graph Order</h1>
    <div class="subtitle">
        The reads arrive as a heap of disconnected fragments. Watch the graph <b>assemble itself</b> by gluing
        vertices that share a label &mdash; and use the read-length dial to see when one genome becomes two.
    </div>

    <div class="stage-wrap">
        <div class="stage-head">
            <div>
                <div class="step-eyebrow" id="eyebrow">Step 1 of 5</div>
                <div class="step-title" id="title">A genome is just a string</div>
            </div>
            <div class="badge" id="badge">&mdash;</div>
        </div>

        <svg class="stage" id="svg" viewBox="0 0 1000 440" preserveAspectRatio="xMidYMid meet" aria-label="de Bruijn graph stage">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--line)"/></marker>
                <marker id="arrow-ctx" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker>
            </defs>
            <g id="layer-edges"></g>
            <g id="layer-labels"></g>
            <g id="layer-nodes"></g>
            <g id="layer-cards"></g>
            <g id="layer-trace"></g>
        </svg>

        <div class="stage-foot">
            <div class="caption" id="caption"></div>
            <div id="reconstruct" style="display:none;"></div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="backBtn" onclick="prevStep()">◀ Back</button>
            <button id="nextBtn" class="primary" onclick="nextStep()">Next ▶</button>
            <button id="replayBtn" onclick="replay()" style="display:none">↻ Replay</button>
            <button onclick="restart()">Restart</button>
        </div>
        <div class="progress" id="progress"></div>
        <div class="seq-picker">
            <span class="lbl">Genome:</span>
            <button class="chip" data-seq="GATTACAGCATGGCTAAC">example A</button>
            <button class="chip" data-seq="AGCTTAGCATGCAGTCAG">example B</button>
            <input type="text" id="customSeq" maxlength="30" placeholder="your own (ACGT)">
        </div>
        <div class="slider-group">
            <label for="kSlider">Read length k:</label>
            <input type="range" id="kSlider" min="3" max="8" value="4" oninput="updateK(this.value)">
            <span class="val" id="kVal">4</span>
        </div>
        <div class="slider-group">
            <label for="speed">Speed:</label>
            <input type="range" id="speed" min="1" max="10" value="5">
        </div>
    </div>

<script>
/* ===================== MODEL ===================== */
const RED='#e60000', TEAL='#1f7a8c';
let seq='GATTACAGCATGGCTAAC', kForce=null, M=null, step=0;
const TOTAL_STEPS=5;
const STEP_INFO=[
  { title:'A genome is just a string' },
  { title:'Sequencing shatters it into reads' },
  { title:'Each read is a triple: vertex → edge → vertex' },
  { title:'Glue vertices that share a label' },
  { title:'Walk every edge once — read it off' },
];

function autoK(s){ for(let k=3;k<=s.length;k++){ const seen=new Set(); let ok=true;
  for(let i=0;i+(k-1)<=s.length;i++){ const w=s.substr(i,k-1); if(seen.has(w)){ok=false;break;} seen.add(w);} if(ok) return k;} return s.length; }

// enumerate distinct reconstructions (by spelled string), up to `cap`
function enumEuler(edges,cap=2,budget=600000){
  const E=edges.length; if(!E) return [];
  const adj={}, outd={}, ind={}, nodes=new Set();
  edges.forEach(e=>{ (adj[e.from]=adj[e.from]||[]).push(e); outd[e.from]=(outd[e.from]||0)+1; ind[e.to]=(ind[e.to]||0)+1; nodes.add(e.from); nodes.add(e.to); });
  let start=null;
  for(const n of nodes){ if((outd[n]||0)-(ind[n]||0)===1){ start=n; break; } }
  if(start===null) for(const n of nodes){ if(outd[n]){ start=n; break; } }
  if(start===null) return [];
  const used=new Array(E).fill(false), path=[], seen=new Map(); let steps=0, stop=false;
  const recon=p=>{ let r=edges[p[0]].from; for(const id of p) r+=edges[id].label.slice(-1); return r; };
  (function dfs(node,count){
    if(stop) return; if(++steps>budget){ stop=true; return; }
    if(count===E){ const r=recon(path); if(!seen.has(r)){ seen.set(r,path.slice()); if(seen.size>=cap) stop=true; } return; }
    for(const e of (adj[node]||[])){ if(!used[e.id]){ used[e.id]=true; path.push(e.id); dfs(e.to,count+1); path.pop(); used[e.id]=false; if(stop) return; } }
  })(start,0);
  return [...seen.entries()].map(([recon,order])=>({recon,order}));
}

function buildModel(s){
  const k=Math.max(3, Math.min(kForce||autoK(s), s.length-1));
  const kmers=[]; for(let i=0;i+k<=s.length;i++) kmers.push(s.substr(i,k));
  const edges=kmers.map((km,i)=>({id:i,label:km,from:km.slice(0,k-1),to:km.slice(1)}));
  // parallel-edge index (for separating multi-edges in the drawing)
  const grp={}; edges.forEach(e=>{ const key=e.from+'>'+e.to; e.par=(grp[key]=(grp[key]||0)+1)-1; e.self=(e.from===e.to); });

  let paths=enumEuler(edges,2);
  if(!paths.length){ // fallback: genome order
    const ord=edges.map(e=>e.id); let r=edges.length?edges[0].from:s.slice(0,k-1); edges.forEach(e=>r+=e.label.slice(-1));
    paths=[{recon:r,order:ord}];
  }
  const order=paths[0].order;
  const nodeOrder=[]; const seenN=new Set();
  (order.length?[edges[order[0]].from, ...order.map(id=>edges[id].to)]:[]).forEach(n=>{ if(!seenN.has(n)){ seenN.add(n); nodeOrder.push(n); } });
  // any node not on the path (disconnected) — append so it still renders
  edges.forEach(e=>[e.from,e.to].forEach(n=>{ if(!seenN.has(n)){ seenN.add(n); nodeOrder.push(n); } }));

  const distinct=new Set(edges.flatMap(e=>[e.from,e.to])).size;
  const cnt={}; edges.forEach(e=>{ cnt[e.from]=(cnt[e.from]||0)+1; cnt[e.to]=(cnt[e.to]||0)+1; });
  let dupLabel=null; for(const e of edges){ if(cnt[e.to]>1){ dupLabel=e.to; break; } }

  return { s,k,kmers,edges,nodeOrder,order, paths,
           recon:paths[0].recon, ambiguous:paths.length>=2,
           degenerate:(k>=s.length), uniqueNodes:nodeOrder.length, dupLabel };
}

/* ===================== LAYOUT ===================== */
const VW=1000, VH=440, X0=95, X1=905, R=24;
function nodeFont(len){ return len<=3?13 : len===4?11 : len===5?9 : 8; }

function serpentine(){
  const N=M.nodeOrder.length;
  const rows=Math.min(4,Math.max(1,Math.ceil(N/6)));
  const cols=Math.max(1,Math.ceil(N/rows));
  const colW=cols>1?(X1-X0)/(cols-1):0;
  const rowH=rows>1?Math.min(108,300/(rows-1)):0;
  const startY=VH/2-((rows-1)*rowH)/2-6;
  const pos={};
  M.nodeOrder.forEach((n,i)=>{ const r=Math.floor(i/cols); let c=i%cols; if(r%2===1)c=cols-1-c;
    pos[n]={x:X0+c*colW,y:startY+r*rowH,i}; });
  return { pos,rows,cols };
}
function triplePositions(){
  const n=M.kmers.length, rng=mulberry(1234+n*7);
  const cols=Math.ceil(Math.sqrt(n*1.5)), rows=Math.ceil(n/cols);
  const padX=130, padY=66, areaW=VW-2*padX, areaH=VH-2*padY, slotW=areaW/cols, slotH=areaH/rows, sep=34;
  return M.kmers.map((_,i)=>{ const r=Math.floor(i/cols), c=i%cols;
    const cx=padX+slotW*(c+0.5)+(rng()-0.5)*slotW*0.30, cy=padY+slotH*(r+0.5)+(rng()-0.5)*slotH*0.30;
    const a=(rng()-0.5)*1.5, dx=Math.cos(a)*sep, dy=Math.sin(a)*sep;
    return { fx:cx-dx, fy:cy-dy, tx:cx+dx, ty:cy+dy, cx, cy, a }; });
}
function edgeGeom(a,b,opts={}){
  const par=opts.par||0;
  if(opts.self){ const x=a.x, y=a.y, s=16+par*10;
    return { d:`M ${x-9},${y-R+5} C ${x-s-20},${y-R-46} ${x+s+20},${y-R-46} ${x+9},${y-R+5}`, lx:x, ly:y-R-36 }; }
  const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, ux=dx/d, uy=dy/d;
  const ax=a.x+ux*R, ay=a.y+uy*R, bx=b.x-ux*R, by=b.y-uy*R, mx=(ax+bx)/2, my=(ay+by)/2;
  const side=(par%2===0)?1:-1, mag=Math.min(24,d*0.10)+Math.floor(par/2)*16;
  const nx=-uy*side, ny=ux*side, cx=mx+nx*mag, cy=my+ny*mag;
  return { d:`M ${ax},${ay} Q ${cx},${cy} ${bx},${by}`, lx:cx+nx*9, ly:cy+ny*9 };
}

/* ===================== SVG HELPERS ===================== */
const NS='http://www.w3.org/2000/svg', $=id=>document.getElementById(id);
const layers={}; ['edges','labels','nodes','cards','trace'].forEach(k=>layers[k]=$('layer-'+k));
function clearLayers(){ Object.values(layers).forEach(g=>g.innerHTML=''); }
function el(tag,attrs={},parent=null){ const n=document.createElementNS(NS,tag);
  for(const k in attrs) n.setAttribute(k,attrs[k]); if(parent) parent.appendChild(n); return n; }
function readCard(parent,cx,cy,text,rot){
  const g=el('g',{transform:`translate(${cx},${cy}) rotate(${rot||0})`,class:'read-card'},parent);
  const w=Math.max(54,text.length*13+18);
  el('rect',{x:-w/2,y:-19,width:w,height:38,rx:5,fill:'var(--panel-2)',stroke:'var(--line)','stroke-width':1.5},g);
  const t=el('text',{x:0,y:0,'text-anchor':'middle','dominant-baseline':'central','font-size':15,fill:'var(--ink)'},g); t.textContent=text; return g;
}
function vertex(parent,x,y,label,cls){
  const g=el('g',{},parent);
  el('circle',{cx:x,cy:y,r:R,class:'node-c '+(cls||''),'data-node':label},g);
  const t=el('text',{x:x,y:y,class:'node-t','font-size':nodeFont(label.length)},g); t.textContent=label; return g;
}
function barColor(v){ const lo=[226,179,163],hi=[103,12,7],f=i=>Math.round(lo[i]+v*(hi[i]-lo[i])); return `rgb(${f(0)},${f(1)},${f(2)})`; }
function gradFor(i,n){ return barColor(n<=1?0.5:0.12+0.78*i/(n-1)); }

/* ===================== STEPS ===================== */
let traceTimer=null, traceTimeouts=[];
function stopAnim(){ if(traceTimer){ cancelAnimationFrame(traceTimer); traceTimer=null; } traceTimeouts.forEach(clearTimeout); traceTimeouts=[]; }

function render(){
  stopAnim(); clearLayers();
  $('reconstruct').style.display='none'; $('reconstruct').innerHTML='';
  $('eyebrow').textContent=`Step ${step+1} of ${TOTAL_STEPS}`;
  $('title').textContent=STEP_INFO[step].title;
  $('backBtn').disabled=(step===0); $('nextBtn').disabled=(step===TOTAL_STEPS-1);
  $('replayBtn').style.display=(step===3||step===4)?'inline-block':'none';
  updateProgress();
  [renderSeq,renderShatter,renderTriples,renderGlue,renderEuler][step]();
}
function setBadge(h){ $('badge').innerHTML=h; }
function setCaption(h){ $('caption').innerHTML=h; }
function statusBadge(){
  const tag = M.ambiguous ? `<span class="amb">⚠ ambiguous</span>` : `<span class="uniq">✓ unique</span>`;
  return `read length <b>${M.k}</b> &middot; ${M.kmers.length} reads &middot; ${M.uniqueNodes} vertices &middot; ${tag}`;
}

function renderSeq(){
  setBadge(`${M.s.length} letters`);
  const s=M.s, tw=Math.min(34,(X1-X0)/s.length-4), gap=6, total=s.length*(tw+gap)-gap, sx=VW/2-total/2+tw/2;
  for(let i=0;i<s.length;i++){
    const g=el('g',{transform:`translate(${sx+i*(tw+gap)},${VH/2})`,class:'fade-in'},layers.cards); g.style.animationDelay=(i*0.03)+'s';
    el('rect',{x:-tw/2,y:-21,width:tw,height:42,rx:4,fill:gradFor(i,s.length),stroke:'rgba(0,0,0,.05)'},g);
    const t=el('text',{x:0,y:0,'text-anchor':'middle','dominant-baseline':'central',class:'mono','font-size':17,'font-weight':700,fill:'#fff'},g); t.textContent=s[i];
  }
  setCaption(`Our toy genome: <b class="mono">${s}</b>. A real one is the same idea at three&nbsp;billion letters
    &mdash; and no machine reads it end&#8209;to&#8209;end. We only ever get fragments.`);
}

function renderShatter(){
  setBadge(statusBadge());
  const slots=triplePositions();
  M.kmers.forEach((km,i)=>{ const g=readCard(layers.cards,slots[i].cx,slots[i].cy,km,(slots[i].a*40).toFixed(1));
    g.classList.add('fade-in'); g.style.animationDelay=(i*0.04)+'s'; });
  setCaption(`A sequencer chops the genome into short overlapping <b>reads</b> &mdash; every ${M.k}&#8209;letter
    window &mdash; and returns <b>${M.kmers.length} pieces in no order</b>. Reordering them blindly is
    ${M.kmers.length}! &asymp; <b>${factorialStr(M.kmers.length)}</b> possibilities.`);
}

function renderTriples(){
  setBadge(`${M.kmers.length} triples &middot; ${M.uniqueNodes} distinct labels`);
  const slots=triplePositions();
  M.edges.forEach((e,i)=>{
    const a={x:slots[i].fx,y:slots[i].fy}, b={x:slots[i].tx,y:slots[i].ty}, g=edgeGeom(a,b);
    const grp=el('g',{class:'fade-in'},layers.cards); grp.style.animationDelay=(i*0.04)+'s';
    el('path',{d:g.d,class:'e-path','marker-end':'url(#arrow)'},grp);
    vertex(grp,a.x,a.y,e.from); vertex(grp,b.x,b.y,e.to);
    const t=el('text',{x:slots[i].cx,y:slots[i].cy-46,'text-anchor':'middle','font-size':10,'font-weight':700,fill:'var(--bar-hi)',class:'mono'},grp); t.textContent=e.label;
  });
  setCaption(`The de Bruijn move. Each read becomes a tiny <b>triple</b>: a directed <b>edge</b> (the read) joining
    its <b>prefix</b> vertex to its <b>suffix</b> vertex &mdash; both (${M.k}&#8209;1)&#8209;mers. They lie scattered
    and disconnected. Some labels already repeat${M.dupLabel?` (e.g. <b class="mono">${M.dupLabel}</b>)`:''} &mdash; those are secretly the same vertex.`);
}

function renderGlue(){
  setBadge(statusBadge());
  setCaption(`The only rule: <b>vertices with the same label are the same vertex</b> &mdash; so glue them. We never
    compare reads letter&#8209;by&#8209;letter; we just file each label by name. The loose triples zip together into a
    graph. ${M.ambiguous?`Because the reads are short, some labels collect <b>three or more</b> triples &mdash; <b>branches</b> appear.`:`Every label collects exactly two triples, so the result is a single <b>path</b>.`}`);
  playGlue();
}

function playGlue(){
  stopAnim();
  clearLayers();
  const slots=triplePositions(), {pos}=serpentine();
  const insts=[]; const edgeInst={};
  M.edges.forEach((e,i)=>{
    const fi=insts.length; insts.push({x0:slots[i].fx,y0:slots[i].fy,tx:pos[e.from].x,ty:pos[e.from].y,label:e.from});
    const ti=insts.length; insts.push({x0:slots[i].tx,y0:slots[i].ty,tx:pos[e.to].x,ty:pos[e.to].y,label:e.to});
    edgeInst[e.id]={f:fi,t:ti};
  });
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const speed=parseInt($('speed').value||5), D=Math.max(1100,2600-speed*150), t0=performance.now();
  const ease=t=>1-Math.pow(1-t,3);
  function finish(){ clearLayers(); drawFullGraph(); }
  if(reduce){ finish(); return; }
  function frame(now){
    const gp=Math.min(1,(now-t0)/D);
    layers.cards.innerHTML=''; layers.edges.innerHTML='';
    insts.forEach((ins,idx)=>{ const st=(Math.floor(idx/2)/M.edges.length)*0.45, local=Math.max(0,Math.min(1,(gp-st)/(1-st)));
      ins.cx=ins.x0+(ins.tx-ins.x0)*ease(local); ins.cy=ins.y0+(ins.ty-ins.y0)*ease(local); });
    M.edges.forEach(e=>{ const fi=insts[edgeInst[e.id].f], ti=insts[edgeInst[e.id].t];
      const self=(Math.hypot(fi.cx-ti.cx,fi.cy-ti.cy)<3), g=edgeGeom({x:fi.cx,y:fi.cy},{x:ti.cx,y:ti.cy},{self});
      el('path',{d:g.d,class:'e-path','marker-end':'url(#arrow)'},layers.edges); });
    insts.forEach(ins=>{ const merged=(Math.hypot(ins.cx-ins.tx,ins.cy-ins.ty)<1.5); vertex(layers.cards,ins.cx,ins.cy,ins.label,merged?'':'dup'); });
    if(gp<1) traceTimer=requestAnimationFrame(frame); else finish();
  }
  traceTimer=requestAnimationFrame(frame);
}

function renderEuler(){
  setBadge(statusBadge());
  drawFullGraph();
  const wrap=$('reconstruct'); wrap.style.display='block'; wrap.innerHTML='';
  if(!M.ambiguous){
    const tiles=makeRow(wrap,'Reconstructed genome',null,M.recon,null);
    setCaption(`Read it off: follow the thread, crossing <b>every edge exactly once</b>. Each edge adds one letter, and
      the shuffled heap spells out the original genome &mdash; <b>we never told the graph the order</b>. It emerged from
      gluing matching labels.`);
    tracePath(M.paths[0].order,RED,tiles,null);
  } else {
    const a=M.paths[0].recon, b=M.paths[1].recon;
    const tilesA=makeRow(wrap,'Reading 1',RED,a,b);
    const tilesB=makeRow(wrap,'Reading 2',TEAL,b,a);
    setCaption(`Now there is a <b>branch</b>, so more than one walk uses every edge exactly once &mdash; and they spell
      <b>different genomes</b>. Both are perfectly consistent with the reads. The data alone can't choose:
      that is <b>assembly ambiguity</b>. Raise the read length <b>k</b> and watch it collapse back to one answer.`);
    tracePath(M.paths[0].order,RED,tilesA,()=>{
      const to=setTimeout(()=>{ resetEdges(); tracePath(M.paths[1].order,TEAL,tilesB,null); },850); traceTimeouts.push(to);
    });
  }
}

/* ----- drawing ----- */
function drawFullGraph(){
  const {pos}=serpentine();
  M.edges.forEach(e=>{ const g=edgeGeom(pos[e.from],pos[e.to],{par:e.par,self:e.self});
    el('path',{d:g.d,class:'e-path','marker-end':'url(#arrow)','data-eid':e.id},layers.edges);
    const t=el('text',{x:g.lx,y:g.ly,class:'e-label','data-lid':e.id},layers.labels); t.textContent=e.label; });
  M.nodeOrder.forEach((n,i)=>{ const g=el('g',{class:'fade-in'},layers.nodes); g.style.animationDelay=(i*0.015)+'s';
    el('circle',{cx:pos[n].x,cy:pos[n].y,r:R,class:'node-c','data-node':n},g);
    const t=el('text',{x:pos[n].x,y:pos[n].y,class:'node-t','font-size':nodeFont(n.length)},g); t.textContent=n; });
}
function resetEdges(){
  layers.edges.querySelectorAll('[data-eid]').forEach(p=>{ p.style.stroke=''; p.style.strokeWidth=''; p.setAttribute('marker-end','url(#arrow)'); });
  layers.labels.querySelectorAll('[data-lid]').forEach(t=>{ t.style.fill=''; });
}

/* ----- a reconstruction row in the foot ----- */
function makeRow(wrap,label,color,str,other){
  const row=document.createElement('div'); row.className='recon-row';
  const head=document.createElement('div'); head.className='readout';
  head.innerHTML=(color?`<span class="swatch" style="background:${color}"></span>`:'')+label;
  const tilesEl=document.createElement('div'); tilesEl.className='seq-tiles'; if(color) tilesEl.style.color=color;
  row.appendChild(head); row.appendChild(tilesEl); wrap.appendChild(row);
  const tiles=[];
  for(let i=0;i<str.length;i++){ const d=document.createElement('div'); d.className='tile'+(other&&str[i]!==other[i]?' diff':'');
    d.textContent=str[i]; tilesEl.appendChild(d); tiles.push(d); }
  return tiles;
}

/* ----- trace one Eulerian path in a given colour ----- */
function tracePath(order,color,tiles,onDone){
  const paths={},labels={},nodes={};
  layers.edges.querySelectorAll('[data-eid]').forEach(p=>paths[p.getAttribute('data-eid')]=p);
  layers.labels.querySelectorAll('[data-lid]').forEach(p=>labels[p.getAttribute('data-lid')]=p);
  layers.nodes.querySelectorAll('[data-node]').forEach(c=>nodes[c.getAttribute('data-node')]=c);
  const dot=el('circle',{r:8,fill:color,stroke:'#fff','stroke-width':2,opacity:0,filter:'drop-shadow(0 0 4px rgba(0,0,0,.35))'},layers.trace);
  if(!order.length){ if(onDone)onDone(); return; }
  const start=M.edges[order[0]].from;
  for(let i=0;i<start.length&&i<tiles.length;i++) tiles[i].classList.add('show');
  let filled=start.length; setLive(nodes,start,true); dot.setAttribute('opacity','1');
  let idx=0; const dur=()=>1400/parseInt($('speed').value||5);
  function walk(eid,done){
    const path=paths[eid]; if(!path){ done(); return; }
    const len=path.getTotalLength(); path.style.stroke=color; path.style.strokeWidth='4.5'; path.setAttribute('marker-end','url(#arrow-ctx)');
    if(labels[eid]) labels[eid].style.fill=color;
    let t0=null; const D=dur();
    function frame(ts){ if(!t0)t0=ts; const k=Math.min(1,(ts-t0)/D), pt=path.getPointAtLength(k*len);
      dot.setAttribute('cx',pt.x); dot.setAttribute('cy',pt.y);
      if(k<1) traceTimer=requestAnimationFrame(frame); else { path.style.strokeWidth='3'; done(); } }
    traceTimer=requestAnimationFrame(frame);
  }
  function next(){ if(idx>=order.length){ dot.setAttribute('opacity','0'); Object.values(nodes).forEach(c=>c.classList.remove('live')); if(onDone)onDone(); return; }
    const e=M.edges[order[idx]]; setLive(nodes,e.from,true);
    walk(e.id,()=>{ if(filled<tiles.length) tiles[filled++].classList.add('show');
      setLive(nodes,e.from,false); setLive(nodes,e.to,true); idx++; const to=setTimeout(next,Math.max(40,dur()*0.1)); traceTimeouts.push(to); }); }
  const to=setTimeout(next,300); traceTimeouts.push(to);
}
function setLive(nodes,name,on){ const c=nodes[name]; if(c) c.classList.toggle('live',on); }

/* ===================== UTIL ===================== */
function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function factorialStr(n){ let f=1; for(let i=2;i<=n;i++){ f*=i; if(f>1e15) return f.toExponential(1).replace('e+','×10^'); }
  if(f>=1e6) return f.toExponential(1).replace('e+','×10^'); return f.toLocaleString('en-US'); }

/* ===================== UI ===================== */
function updateProgress(){ const p=$('progress'); p.innerHTML='';
  for(let i=0;i<TOTAL_STEPS;i++){ const d=document.createElement('div');
    d.className='dot'+(i===step?' active':'')+(i<step?' done':''); d.title='Step '+(i+1);
    d.onclick=()=>{ step=i; render(); }; p.appendChild(d); } }
function nextStep(){ if(step<TOTAL_STEPS-1){ step++; render(); } }
function prevStep(){ if(step>0){ step--; render(); } }
function restart(){ step=0; render(); }
function replay(){ if(step===3) playGlue(); else if(step===4) render(); }

function syncKControl(){
  const maxK=Math.min(8, M.s.length-1);
  const sl=$('kSlider'); sl.max=maxK; sl.value=M.k; $('kVal').textContent=M.k;
}
function updateK(v){
  kForce=parseInt(v); M=buildModel(seq); syncKControl();
  render();
}
function loadSeq(s){ seq=s; kForce=null; M=buildModel(seq); step=0;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.seq===s));
  syncKControl(); render(); }
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{ $('customSeq').value=''; loadSeq(c.dataset.seq); }));
$('customSeq').addEventListener('keydown',e=>{ if(e.key==='Enter') applyCustom(); });
$('customSeq').addEventListener('change',applyCustom);
function applyCustom(){
  let v=($('customSeq').value||'').toUpperCase().replace(/[^ACGT]/g,''); $('customSeq').value=v;
  if(v.length<5){ setCaption(`<span class="err">Use A, C, G, T &mdash; at least 5 letters.</span>`); return; }
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); loadSeq(v);
}

loadSeq('GATTACAGCATGGCTAAC');
</script>
